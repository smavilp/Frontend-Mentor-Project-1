<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>
  
</head>
<body>
  <main>
    <picture>
      <source media="(min-width:992px)" srcset="./images/image-product-desktop.jpg">
      <img src="./images/image-product-mobile.jpg" alt="{your alt text goes here}">
    </picture>
    <div>
      <span class="text-1">
        PERFUME
      </span>
      <h1>
        Gabrielle Essence Eau De Parfum
      </h1>
      <p>
        A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
      </p>
      <div class="prices-div">
        <span class="text-2">$149.99</span>
        <del><span class="sr-only">Old price:</span>$169.99</del>
      </div>
      <button>
        <img src="./images/icon-cart.svg" alt="cart icon">
        <span>
          Add to Cart
        </span>
      </button>
    </div>
  </main>
  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/smavilp">Sebastián Martínez Arango</a>.</div>
  </footer>
</body>
</html>
